<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELF LEARNING 登录</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f9;
            --panel: #ffffff;
            --text: #20242a;
            --muted: #606975;
            --line: #d8dde5;
            --accent: #2364aa;
            --accent-hover: #184f87;
            --danger: #b42318;
            --danger-bg: #fff0ed;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }
        main {
            width: min(100%, 380px);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 28px;
            box-shadow: 0 14px 34px rgba(25, 35, 50, 0.09);
        }
        h1 {
            margin: 0 0 6px;
            font-size: 22px;
            line-height: 1.25;
            letter-spacing: 0;
        }
        p {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 14px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 13px;
        }
        input {
            width: 100%;
            height: 42px;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 0 12px;
            font: inherit;
            color: var(--text);
            background: #fff;
        }
        input:focus {
            outline: 2px solid rgba(35, 100, 170, 0.16);
            border-color: var(--accent);
        }
        button {
            width: 100%;
            height: 42px;
            margin-top: 18px;
            border: 0;
            border-radius: 6px;
            background: var(--accent);
            color: #fff;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: var(--accent-hover); }
        button:disabled {
            cursor: wait;
            opacity: 0.7;
        }
        .message {
            display: none;
            margin-bottom: 16px;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.45;
        }
        .message.error {
            display: block;
            color: var(--danger);
            background: var(--danger-bg);
            border: 1px solid rgba(180, 35, 24, 0.24);
        }
    </style>
</head>
<body>
    <main>
        <h1>SELF LEARNING</h1>
        <p>WebUI 控制台</p>
        <div id="message" class="message"></div>
        <form id="login-form">
            <label for="password">登录密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button id="submit" type="submit">登录</button>
        </form>
    </main>
    <script>
        const form = document.getElementById("login-form");
        const message = document.getElementById("message");
        const submit = document.getElementById("submit");
        const password = document.getElementById("password");

        function showError(text) {
            message.textContent = text || "登录失败，请检查密码";
            message.className = "message error";
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            message.className = "message";
            submit.disabled = true;
            submit.textContent = "登录中...";
            try {
                const response = await fetch("/api/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({password: password.value})
                });
                const data = await response.json();
                if (response.ok) {
                    window.location.href = data.redirect || "/api/index";
                    return;
                }
                showError(data.error);
                password.value = "";
                password.focus();
            } catch (error) {
                showError("网络连接失败，请稍后重试");
            } finally {
                submit.disabled = false;
                submit.textContent = "登录";
            }
        });

        password.focus();
    </script>
</body>
</html>
