<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改 WebUI 密码</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f9;
            --panel: #ffffff;
            --text: #20242a;
            --muted: #606975;
            --line: #d8dde5;
            --accent: #2364aa;
            --accent-hover: #184f87;
            --danger: #b42318;
            --danger-bg: #fff0ed;
            --success: #067647;
            --success-bg: #ecfdf3;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }
        main {
            width: min(100%, 420px);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 28px;
            box-shadow: 0 14px 34px rgba(25, 35, 50, 0.09);
        }
        h1 {
            margin: 0 0 6px;
            font-size: 22px;
            line-height: 1.25;
            letter-spacing: 0;
        }
        p {
            margin: 0 0 22px;
            color: var(--muted);
            font-size: 14px;
        }
        label {
            display: block;
            margin: 14px 0 8px;
            color: var(--muted);
            font-size: 13px;
        }
        input {
            width: 100%;
            height: 42px;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 0 12px;
            font: inherit;
            color: var(--text);
            background: #fff;
        }
        input:focus {
            outline: 2px solid rgba(35, 100, 170, 0.16);
            border-color: var(--accent);
        }
        button {
            width: 100%;
            height: 42px;
            margin-top: 20px;
            border: 0;
            border-radius: 6px;
            background: var(--accent);
            color: #fff;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: var(--accent-hover); }
        button:disabled {
            cursor: wait;
            opacity: 0.7;
        }
        .message {
            display: none;
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.45;
        }
        .message.error {
            display: block;
            color: var(--danger);
            background: var(--danger-bg);
            border: 1px solid rgba(180, 35, 24, 0.24);
        }
        .message.success {
            display: block;
            color: var(--success);
            background: var(--success-bg);
            border: 1px solid rgba(6, 118, 71, 0.22);
        }
    </style>
</head>
<body>
    <main>
        <h1>修改 WebUI 密码</h1>
        <p>首次开启密码后需要完成一次密码更新。</p>
        <div id="message" class="message"></div>
        <form id="change-form">
            <label for="old-password">当前密码</label>
            <input id="old-password" name="old_password" type="password" autocomplete="current-password" required>
            <label for="new-password">新密码</label>
            <input id="new-password" name="new_password" type="password" autocomplete="new-password" required>
            <label for="confirm-password">确认新密码</label>
            <input id="confirm-password" name="confirm_password" type="password" autocomplete="new-password" required>
            <button id="submit" type="submit">保存密码</button>
        </form>
    </main>
    <script>
        const form = document.getElementById("change-form");
        const message = document.getElementById("message");
        const submit = document.getElementById("submit");
        const oldPassword = document.getElementById("old-password");
        const newPassword = document.getElementById("new-password");
        const confirmPassword = document.getElementById("confirm-password");

        function showMessage(text, type) {
            message.textContent = text;
            message.className = "message " + type;
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            message.className = "message";
            if (newPassword.value !== confirmPassword.value) {
                showMessage("两次输入的新密码不一致", "error");
                confirmPassword.focus();
                return;
            }
            submit.disabled = true;
            submit.textContent = "保存中...";
            try {
                const response = await fetch("/api/plugin_change_password", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        old_password: oldPassword.value,
                        new_password: newPassword.value
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message || "密码修改成功", "success");
                    setTimeout(() => {
                        window.location.href = data.redirect || "/api/index";
                    }, 900);
                    return;
                }
                showMessage(data.error || "密码修改失败", "error");
                oldPassword.value = "";
                oldPassword.focus();
            } catch (error) {
                showMessage("网络连接失败，请稍后重试", "error");
            } finally {
                submit.disabled = false;
                submit.textContent = "保存密码";
            }
        });

        oldPassword.focus();
    </script>
</body>
</html>
